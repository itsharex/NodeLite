<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>XiMonitor</title>
    <script>
      // 主题闪烁修复:在第一次 paint 之前同步把存储的主题偏好写到 <html> 上。
      // 不做这步时,浏览器会先按 :root 的 dark 默认值渲染一帧,等下方 main
      // script 跑到 applyTheme() 才切到 light,用户能看到几十毫秒的"暗 → 亮"
      // 闪烁。该 IIFE 必须保持同步 + 不依赖 document.body(此处 body 尚未解析)。
      (function () {
        try {
          var stored = window.localStorage.getItem("ximonitor.ui.theme");
          var theme = stored === "light" ? "light" : "dark";
          document.documentElement.setAttribute("data-theme", theme);
        } catch (_e) {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      })();

      // 认证过期检查:如果距离上次成功加载超过 24 小时,清除浏览器的 Basic Auth
      // 缓存并跳转到登出页面,强制用户重新登录。
      (function () {
        var AUTH_TIMESTAMP_KEY = "ximonitor.auth.timestamp";
        var AUTH_EXPIRY_MS = 24 * 60 * 60 * 1000; // 24 小时
        try {
          var stored = window.localStorage.getItem(AUTH_TIMESTAMP_KEY);
          var now = Date.now();
          if (stored) {
            var lastAuth = parseInt(stored, 10);
            if (now - lastAuth > AUTH_EXPIRY_MS) {
              // 超过 24 小时,清除时间戳并跳转到登出页面(触发 401 重新认证)
              window.localStorage.removeItem(AUTH_TIMESTAMP_KEY);
              window.location.href = "/logout-and-reauth";
              return;
            }
          }
          // 更新时间戳(每次页面加载都刷新,表示"最近一次活跃")
          window.localStorage.setItem(AUTH_TIMESTAMP_KEY, now.toString());
        } catch (_e) {
          // localStorage 不可用时静默失败,不阻断页面加载
        }
      })();
    </script>
    <style>
      :root {
        color-scheme: dark;
        --bg-app: #060912;
        --bg-sidebar: #0a0f1a;
        --bg-card: #0e1422;
        --bg-card-soft: #121a2c;
        --bg-elevated: #18223a;
        --border-soft: rgba(148, 163, 184, 0.08);
        --border-strong: rgba(148, 163, 184, 0.16);
        --text-primary: #e6edf3;
        --text-secondary: #b6bfcc;
        --text-muted: #6b7785;
        --text-dim: #4b5563;
        --accent-blue: #3b82f6;
        --accent-blue-soft: rgba(59, 130, 246, 0.16);
        --accent-green: #22c55e;
        --accent-green-soft: rgba(34, 197, 94, 0.18);
        --accent-yellow: #eab308;
        --accent-yellow-soft: rgba(234, 179, 8, 0.18);
        --accent-red: #ef4444;
        --accent-red-soft: rgba(239, 68, 68, 0.18);
        --accent-purple: #a855f7;
        --map-land-dot: rgba(148, 163, 184, 0.48);
        --map-land-stroke: rgba(15, 23, 42, 0.34);
        font-family: "Inter", "PingFang SC", "Helvetica Neue", "Segoe UI", system-ui, -apple-system, sans-serif;
      }
      :root[data-theme="light"] {
        color-scheme: light;
        --bg-app: #f4f6fb;
        --bg-sidebar: #ffffff;
        --bg-card: #ffffff;
        --bg-card-soft: #f6f8fc;
        --bg-elevated: #eef2f8;
        --border-soft: rgba(15, 23, 42, 0.06);
        --border-strong: rgba(15, 23, 42, 0.12);
        --text-primary: #0f172a;
        --text-secondary: #334155;
        --text-muted: #64748b;
        --text-dim: #94a3b8;
        --accent-blue-soft: rgba(59, 130, 246, 0.12);
        --accent-green-soft: rgba(34, 197, 94, 0.16);
        --accent-yellow-soft: rgba(234, 179, 8, 0.18);
        --accent-red-soft: rgba(239, 68, 68, 0.16);
        --map-land-dot: rgba(71, 85, 105, 0.56);
        --map-land-stroke: rgba(15, 23, 42, 0.22);
      }
      * { box-sizing: border-box; }
      html, body { height: 100%; }
      body {
        margin: 0;
        color: var(--text-primary);
        background: var(--bg-app);
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      a { color: inherit; text-decoration: none; }
      button { font: inherit; cursor: pointer; }

      .app {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        min-height: 100vh;
      }

      /* ---------- Sidebar ---------- */
      .sidebar {
        background: var(--bg-sidebar);
        border-right: 1px solid var(--border-soft);
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 16px 0 20px;
        gap: 18px;
        position: sticky;
        top: 0;
        height: 100vh;
      }
      .brand {
        width: 40px;
        height: 40px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        background: linear-gradient(135deg, rgba(59,130,246,0.25), rgba(168,85,247,0.18));
        color: var(--accent-blue);
        margin-bottom: 4px;
      }
      .brand svg { width: 22px; height: 22px; }
      .brand-label {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: -6px;
        margin-bottom: 6px;
        letter-spacing: 0.04em;
      }
      .nav-button {
        width: 44px;
        height: 44px;
        display: grid;
        place-items: center;
        border-radius: 12px;
        border: 0;
        background: transparent;
        color: var(--text-muted);
        transition: background 150ms ease, color 150ms ease, transform 150ms ease;
      }
      .nav-button:hover { color: var(--text-secondary); background: var(--bg-card-soft); }
      .nav-button.active {
        color: var(--accent-blue);
        background: var(--accent-blue-soft);
      }
      .nav-button svg { width: 20px; height: 20px; }
      .nav-button + .nav-button { margin-top: 2px; }
      .sidebar-bottom { margin-top: auto; display: flex; flex-direction: column; align-items: center; gap: 10px; }
      .avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: var(--bg-card-soft);
        display: grid;
        place-items: center;
        color: var(--text-muted);
      }
      .avatar svg { width: 18px; height: 18px; }

      /* ---------- Main ---------- */
      .main {
        padding: 24px clamp(20px, 3vw, 36px) 40px;
        max-width: 1680px;
        width: 100%;
      }
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        gap: 24px;
        margin-bottom: 22px;
      }
      .page-title h1 {
        margin: 0;
        font-size: 24px;
        font-weight: 600;
        letter-spacing: -0.01em;
      }
      .page-title p {
        margin: 4px 0 0;
        color: var(--text-muted);
        font-size: 13px;
      }
      .page-actions {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .theme-toggle {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        border: 1px solid var(--border-soft);
        background: var(--bg-card);
        color: var(--text-secondary);
        display: grid;
        place-items: center;
        transition: background 150ms ease, color 150ms ease;
      }
      .theme-toggle:hover { color: var(--text-primary); background: var(--bg-card-soft); }
      .theme-toggle svg { width: 18px; height: 18px; }
      .theme-toggle .sun, .theme-toggle .moon { display: none; }
      :root[data-theme="dark"] .theme-toggle .sun { display: block; }
      :root[data-theme="light"] .theme-toggle .moon { display: block; }
      .updated {
        color: var(--text-muted);
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .lang-select {
        background: var(--bg-card);
        color: var(--text-secondary);
        border: 1px solid var(--border-soft);
        border-radius: 10px;
        padding: 6px 10px;
        font-size: 12px;
      }

      /* ---------- Stat cards ---------- */
      .top-row {
        display: grid;
        grid-template-columns: minmax(0, 1.55fr) minmax(0, 1fr);
        gap: 16px;
        margin-bottom: 16px;
      }
      .top-row > .map-card {
        grid-row: span 2;
      }
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 12px;
      }
      .stat-card {
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 16px;
        padding: 16px 18px;
        display: flex;
        flex-direction: column;
        gap: 12px;
        min-height: 110px;
      }
      .stat-card .label {
        color: var(--text-muted);
        font-size: 13px;
      }
      .stat-card .row {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 10px;
      }
      .stat-card .value {
        font-size: 28px;
        font-weight: 600;
        letter-spacing: -0.02em;
        line-height: 1;
      }
      .stat-card.online .value { color: var(--accent-green); }
      .stat-card.offline .value { color: var(--accent-red); }
      .stat-card.latency .value { color: var(--accent-blue); }
      .stat-icon {
        width: 30px;
        height: 30px;
        border-radius: 10px;
        display: grid;
        place-items: center;
        color: var(--text-muted);
        background: var(--bg-card-soft);
      }
      .stat-card.online .stat-icon { color: var(--accent-green); background: var(--accent-green-soft); }
      .stat-card.offline .stat-icon { color: var(--accent-red); background: var(--accent-red-soft); }
      .stat-card.latency .stat-icon { color: var(--accent-blue); background: var(--accent-blue-soft); }
      .stat-card .stat-icon svg { width: 18px; height: 18px; }

      .stat-card .value-unit {
        font-size: 14px;
        color: var(--text-muted);
        font-weight: 500;
        margin-left: 4px;
      }

      /* ---------- Map + matrix row ---------- */
      .right-stack {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        gap: 16px;
      }
      .panel {
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 16px;
        padding: 18px 20px;
      }
      .panel-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }
      .panel-title {
        font-size: 14px;
        font-weight: 600;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--text-secondary);
      }
      .panel-title small {
        font-weight: 400;
        font-size: 12px;
        color: var(--text-muted);
      }
      .panel-action {
        background: transparent;
        border: 0;
        color: var(--text-muted);
        font-size: 12px;
        display: inline-flex;
        align-items: center;
        gap: 4px;
      }
      .panel-action:hover { color: var(--text-secondary); }

      /* ---------- Map ---------- */
      .map-stage {
        position: relative;
        aspect-ratio: 16 / 8;
        min-height: 280px;
        background:
          radial-gradient(circle at 20% 30%, rgba(59,130,246,0.09), transparent 55%),
          radial-gradient(circle at 78% 62%, rgba(34,197,94,0.06), transparent 52%),
          linear-gradient(135deg, rgba(15,23,42,0.18), rgba(30,41,59,0.04));
        border-radius: 14px;
        overflow: hidden;
      }
      .map-grid {
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
        background-size: 5% 10%;
      }
      .map-canvas {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        filter: drop-shadow(0 18px 36px rgba(0,0,0,0.20));
      }
      .map-dot {
        position: absolute;
        width: 9px;
        height: 9px;
        border-radius: 50%;
        transform: translate(-50%, -50%);
        cursor: pointer;
        box-shadow: 0 0 0 3px rgba(0,0,0,0.34), 0 0 18px currentColor;
      }
      .map-dot::after {
        content: "";
        position: absolute;
        inset: -5px;
        border-radius: 50%;
        animation: dotPulse 2.4s infinite ease-out;
        background: currentColor;
        opacity: 0.14;
      }
      .map-dot.online { color: var(--accent-green); background: var(--accent-green); }
      .map-dot.latency { color: var(--accent-yellow); background: var(--accent-yellow); }
      .map-dot.offline { color: var(--accent-red); background: var(--accent-red); }
      .map-dot.unknown { color: #64748b; background: #64748b; }
      @keyframes dotPulse {
        0% { transform: scale(0.6); opacity: 0.45; }
        100% { transform: scale(1.6); opacity: 0; }
      }
      .map-legend {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 10px;
        color: var(--text-muted);
        font-size: 12px;
      }
      .map-legend span {
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }
      .legend-swatch {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: currentColor;
      }
      .legend-online { color: var(--accent-green); }
      .legend-latency { color: var(--accent-yellow); }
      .legend-offline { color: var(--accent-red); }
      .legend-unknown { color: #64748b; }

      /* ---------- Matrix ---------- */
      .matrix-table { width: 100%; border-collapse: collapse; font-size: 12px; }
      .matrix-table th {
        font-weight: 500;
        color: var(--text-muted);
        text-align: center;
        padding: 8px 4px;
        font-size: 11px;
      }
      .matrix-table th.row-head {
        text-align: left;
        padding-left: 4px;
      }
      .matrix-table td.row-head {
        color: var(--text-secondary);
        font-size: 12px;
        padding: 4px 4px 4px 0;
        text-align: left;
        white-space: nowrap;
      }
      .matrix-cell {
        text-align: center;
        padding: 4px;
        border-radius: 6px;
        color: var(--text-primary);
        font-weight: 500;
        min-width: 56px;
        font-variant-numeric: tabular-nums;
      }
      .matrix-cell.empty { color: var(--text-dim); }
      .matrix-table tr td { padding: 4px; }

      /* ---------- Nodes grid ---------- */
      .nodes-section {
        margin-top: 12px;
      }
      .node-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 14px;
      }
      .node-card {
        background: var(--bg-card);
        border: 1px solid var(--border-soft);
        border-radius: 14px;
        padding: 14px 16px 0;
        display: flex;
        flex-direction: column;
        min-height: 168px;
        transition: transform 160ms ease, border-color 160ms ease;
        overflow: hidden;
      }
      .node-card:hover {
        border-color: var(--border-strong);
        transform: translateY(-1px);
      }
      .node-card-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .node-card-title {
        display: flex;
        align-items: center;
        gap: 8px;
        font-weight: 600;
        font-size: 14px;
        color: var(--text-primary);
        min-width: 0;
      }
      .node-card-title .flag {
        font-size: 18px;
        line-height: 1;
      }
      .node-card-title span {
        text-overflow: ellipsis;
        overflow: hidden;
        white-space: nowrap;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 500;
        padding: 4px 8px;
        border-radius: 999px;
        background: var(--bg-card-soft);
        color: var(--text-muted);
      }
      .badge::before {
        content: "";
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
      }
      .badge.online { color: var(--accent-green); background: var(--accent-green-soft); }
      .badge.latency { color: var(--accent-yellow); background: var(--accent-yellow-soft); }
      .badge.offline { color: var(--accent-red); background: var(--accent-red-soft); }
      .badge.unknown { color: #94a3b8; }

      .node-metrics {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
        margin: 12px 0 4px;
      }
      .node-metric .label {
        font-size: 11px;
        color: var(--text-muted);
        margin-bottom: 2px;
      }
      .node-metric .value {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        font-variant-numeric: tabular-nums;
      }
      .node-metric .value.accent-green { color: var(--accent-green); }
      .node-metric .value.accent-yellow { color: var(--accent-yellow); }
      .node-metric .value.accent-red { color: var(--accent-red); }
      .node-spark {
        height: 52px;
        margin: 8px -16px -2px;
        position: relative;
      }
      .node-spark svg { width: 100%; height: 100%; display: block; }

      .empty {
        background: var(--bg-card);
        border: 1px dashed var(--border-strong);
        border-radius: 14px;
        padding: 28px;
        text-align: center;
        color: var(--text-muted);
      }

      @media (max-width: 1320px) {
        .top-row { grid-template-columns: minmax(0, 1fr); }
        .top-row > .map-card { grid-row: auto; }
      }
      @media (max-width: 900px) {
        .stats-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      }
      @media (max-width: 720px) {
        .app { grid-template-columns: 1fr; }
        .sidebar {
          flex-direction: row;
          width: 100%;
          height: auto;
          position: relative;
          padding: 10px 12px;
          gap: 8px;
          justify-content: space-between;
          border-right: 0;
          border-bottom: 1px solid var(--border-soft);
        }
        .sidebar-bottom { flex-direction: row; margin-top: 0; }
        .main { padding: 16px; }
        .page-header { flex-direction: column; align-items: stretch; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <aside class="sidebar" aria-label="primary">
        <a class="brand" href="/" title="XiMonitor">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12h3l3-7 4 14 3-7h5" />
          </svg>
        </a>
        <div class="brand-label" data-i18n="index.brand">XiMonitor</div>
        <button type="button" class="nav-button active" data-tab="overview" title="Overview" aria-label="Overview">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1.5" />
            <rect x="14" y="3" width="7" height="7" rx="1.5" />
            <rect x="3" y="14" width="7" height="7" rx="1.5" />
            <rect x="14" y="14" width="7" height="7" rx="1.5" />
          </svg>
        </button>
        <button type="button" class="nav-button" data-tab="settings" title="Settings" aria-label="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="3" />
            <path d="M19.4 15a1.7 1.7 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.7 1.7 0 0 0-1.8-.3 1.7 1.7 0 0 0-1 1.5V21a2 2 0 1 1-4 0v-.1a1.7 1.7 0 0 0-1.1-1.5 1.7 1.7 0 0 0-1.8.3l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1a1.7 1.7 0 0 0 .3-1.8 1.7 1.7 0 0 0-1.5-1H3a2 2 0 1 1 0-4h.1a1.7 1.7 0 0 0 1.5-1.1 1.7 1.7 0 0 0-.3-1.8l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1a1.7 1.7 0 0 0 1.8.3H9a1.7 1.7 0 0 0 1-1.5V3a2 2 0 1 1 4 0v.1a1.7 1.7 0 0 0 1 1.5 1.7 1.7 0 0 0 1.8-.3l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.7 1.7 0 0 0-.3 1.8V9a1.7 1.7 0 0 0 1.5 1H21a2 2 0 1 1 0 4h-.1a1.7 1.7 0 0 0-1.5 1z" />
          </svg>
        </button>
        <div class="sidebar-bottom">
          <div class="avatar" title="User">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
          </div>
        </div>
      </aside>

      <main class="main">
        <header class="page-header">
          <div class="page-title">
            <h1 data-i18n="index.heading">Overview</h1>
            <p id="page-subtitle" data-i18n="index.subtitle">Global server monitoring</p>
          </div>
          <div class="page-actions">
            <select id="language-select" class="lang-select" aria-label="Language"></select>
            <button type="button" class="theme-toggle" id="theme-toggle" title="Toggle theme">
              <svg class="sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4" />
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" />
              </svg>
              <svg class="moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
      function templateText(value, vars = {}) {
        return String(value).replace(/\{(\w+)\}/g, (_, key) => String(vars[key] ?? ""));
      }
      function supportedLanguages() {
        return Object.keys(I18N).filter((k) => k && typeof I18N[k] === "object");
      }
      function resolveLanguage(candidate) {
        const langs = supportedLanguages();
        if (candidate && langs.includes(candidate)) return candidate;
        const base = String(candidate || "").split("-")[0].toLowerCase();
        const matched = langs.find((l) => l.toLowerCase().startsWith(base));
        return matched || (langs.includes("en") ? "en" : langs[0] || "en");
      }
      function t(key, vars = {}) {
        const primary = I18N[currentLanguage] || {};
        const fallback = I18N.en || {};
        return templateText(primary[key] ?? fallback[key] ?? key, vars);
      }
      function languageLabel(language) {
        return (I18N[language] && I18N[language].__label) || language;
      }
      function storeLanguage(language) {
        try { window.localStorage.setItem(LANGUAGE_STORAGE_KEY, language); } catch (_e) { /* ignore */ }
      }
      function loadStoredLanguage() {
        try { return window.localStorage.getItem(LANGUAGE_STORAGE_KEY); } catch (_e) { return null; }
      }
      function storeTheme(theme) {
        try { window.localStorage.setItem(THEME_STORAGE_KEY, theme); } catch (_e) { /* ignore */ }
      }
      function loadStoredTheme() {
        try { return window.localStorage.getItem(THEME_STORAGE_KEY); } catch (_e) { return null; }
      }
      function applyTheme(theme) {
        const next = theme === "light" ? "light" : "dark";
        document.documentElement.setAttribute("data-theme", next);
        document.body.setAttribute("data-theme", next);
        storeTheme(next);
      }

      async function loadI18n() {
        try {
          const r = await fetch(I18N_ASSET_PATH, { headers: { accept: "application/json" } });
          if (!r.ok) throw new Error(`${I18N_ASSET_PATH} -> ${r.status}`);
          I18N = await r.json();
        } catch (e) {
          console.warn("failed to load ui translations", e);
        }
        currentLanguage = resolveLanguage(loadStoredLanguage() || navigator.language);
        storeLanguage(currentLanguage);
      }
      function bindLanguageSelector(onChange) {
        const select = document.getElementById("language-select");
        const render = () => {
          select.innerHTML = supportedLanguages()
            .map((l) => `<option value="${escapeHtml(l)}">${escapeHtml(languageLabel(l))}</option>`)
            .join("");
          select.value = currentLanguage;
        };
        render();
        select.addEventListener("change", (e) => {
          currentLanguage = resolveLanguage(e.target.value);
          storeLanguage(currentLanguage);
          render();
          onChange();
        });
      }
      function bindThemeToggle() {
        const button = document.getElementById("theme-toggle");
        button.addEventListener("click", () => {
          const next = document.documentElement.getAttribute("data-theme") === "light" ? "dark" : "light";
          applyTheme(next);
          void renderWorldDotMap();
        });
      }
      function fmtBytes(bytes) {
        if (bytes == null) return t("common.not_available");
        const u = ["B", "KB", "MB", "GB", "TB", "PB"];
        let v = Number(bytes), i = 0;
        while (v >= 1024 && i < u.length - 1) { v /= 1024; i++; }
        return `${v.toFixed(v >= 100 || i === 0 ? 0 : 1)} ${u[i]}`;
      }
      function fmtRate(bytes) {
        if (bytes == null) return t("common.not_available");
        return `${fmtBytes(bytes)}/s`;
      }
      function fmtPercent(value) {
        if (value == null || Number.isNaN(Number(value))) return t("common.not_available");
        return `${Number(value).toFixed(1)}%`;
      }
      function fmtLatency(value) {
        if (value == null) return t("common.not_available");
        return `${Math.round(value)} ms`;
      }
      function fmtDateTime(value) {
        return new Date(value).toLocaleString(currentLanguage);
      }
      function normalizeHistory(history) {
        if (!Array.isArray(history)) return [];
        return history
          .map((point) => ({ ...point, _ts: Date.parse(point.recorded_at) }))
          .filter((point) => Number.isFinite(point._ts))
          .sort((left, right) => left._ts - right._ts);
      }
      function fmtRelative(timestamp) {
        if (!timestamp) return t("common.waiting_for_data");
        const diffMs = Date.now() - new Date(timestamp).getTime();
        if (diffMs < 0) return t("common.updated_relative_just_now");
        const sec = Math.round(diffMs / 1000);
        if (sec < 10) return t("common.updated_relative_just_now");
        if (sec < 60) return t("common.updated_relative_seconds", { seconds: sec });
        const min = Math.round(sec / 60);
        if (min < 60) return t("common.updated_relative_minutes", { minutes: min });
        const hr = Math.round(min / 60);
        return t("common.updated_relative_hours", { hours: hr });
      }
      function hashString(value) {
        let h = 5381;
        for (let i = 0; i < value.length; i++) {
          h = ((h << 5) + h + value.charCodeAt(i)) | 0;
        }
        return Math.abs(h);
      }
      function nodeRegionKey(node) {
        const tags = node.identity.tags || [];
        for (const tag of tags) {
          const lower = String(tag).toLowerCase();
          if (REGION_HINTS[lower]) return lower;
          const m = lower.match(/^(?:country|region|cc|loc)[:=](\w+)$/);
          if (m && REGION_HINTS[m[1]]) return m[1];
        }
        const hostname = String(node.identity.hostname || "").toLowerCase();
        for (const key of Object.keys(REGION_HINTS)) {
          if (hostname.includes(`-${key}-`) || hostname.startsWith(`${key}-`) || hostname.endsWith(`-${key}`)) {
            return key;
          }
        }
        const idLower = String(node.identity.node_id || "").toLowerCase();
        for (const key of Object.keys(REGION_HINTS)) {
          if (idLower.includes(key)) return key;
        }
        return null;
      }
      function nodePosition(node) {
        const region = nodeRegionKey(node);
        const seed = hashString(node.identity.node_id || node.identity.node_label || "");
        if (region) {
          const [x, y] = REGION_HINTS[region];
          // tiny deterministic jitter so multiple servers in same country don't fully overlap
          const jx = ((seed % 23) - 11) / 600;
          const jy = (((seed >> 5) % 19) - 9) / 600;
          return { x: clamp01(x + jx), y: clamp01(y + jy) };
        }
        const x = (seed % 1000) / 1000 * 0.7 + 0.15;
        const y = ((seed >> 7) % 1000) / 1000 * 0.6 + 0.2;
        return { x, y };
      }
      function clamp01(v) { return Math.min(0.98, Math.max(0.02, v)); }
      function nodeFlag(node) {
        const region = nodeRegionKey(node);
        if (region && COUNTRY_FLAGS[region]) return COUNTRY_FLAGS[region];
        return "🌐";
      }
      function nodeStatusKey(node) {
        if (!node.online) return "offline";
        if (node.latency_ms != null && node.latency_ms >= LATENCY_WARN_MS) return "latency";
        return "online";
      }
      function statusLabel(key) {
        switch (key) {
          case "online": return t("common.online");
          case "offline": return t("common.offline");
          case "latency": return t("common.latency_warn");
          default: return t("common.unknown");
        }
      }
      function latencyColor(ms) {
        if (ms == null) return { bg: "var(--bg-card-soft)", fg: "var(--text-dim)" };
        if (ms < 60) return { bg: "rgba(34,197,94,0.18)", fg: "#22c55e" };
        if (ms < 120) return { bg: "rgba(34,197,94,0.10)", fg: "#86efac" };
        if (ms < 200) return { bg: "rgba(234,179,8,0.18)", fg: "#facc15" };
        if (ms < 350) return { bg: "rgba(249,115,22,0.18)", fg: "#fb923c" };
        return { bg: "rgba(239,68,68,0.20)", fg: "#f87171" };
      }

      function mapDotColor() {
        return getComputedStyle(document.documentElement).getPropertyValue("--map-land-dot").trim() || "rgba(148,163,184,0.58)";
      }
      function mapProject(lon, lat) {
        const safeLat = Math.max(-85, Math.min(MAP_MAX_LAT, Number(lat)));
        const latRad = safeLat * Math.PI / 180;
        const mercator = Math.log(Math.tan(Math.PI / 4 + latRad / 2));
        return {
          x: (Number(lon) + 180) * (MAP_WIDTH / 360),
          y: (MAP_HEIGHT / 2) - (MAP_WIDTH * mercator / (2 * Math.PI)) + MAP_VERTICAL_SHIFT,
        };
      }
      function polygonMaxLat(polygon) {
        let maxLat = -90;
        for (const ring of polygon || []) {
          for (const coord of ring || []) {
            const lat = Number(coord[1]);
            if (Number.isFinite(lat)) maxLat = Math.max(maxLat, lat);
          }
        }
        return maxLat;
      }
      function drawProjectedRing(ctx, ring) {
        let started = false;
        let lastLon = null;
        for (const coord of ring) {
          const lon = Number(coord[0]);
          const lat = Number(coord[1]);
          if (!Number.isFinite(lon) || !Number.isFinite(lat)) continue;
          const point = mapProject(lon, lat);
          if (!started || (lastLon != null && Math.abs(lon - lastLon) > 180)) {
            ctx.moveTo(point.x, point.y);
            started = true;
          } else {
            ctx.lineTo(point.x, point.y);
          }
          lastLon = lon;
        }
      }
      function drawGeoJsonMask(ctx, geoJson) {
        ctx.beginPath();
        for (const feature of geoJson.features || []) {
          const geometry = feature.geometry || {};
          if (geometry.type === "Polygon") {
            if (polygonMaxLat(geometry.coordinates) < MAP_MIN_LAT) continue;
            for (const ring of geometry.coordinates || []) drawProjectedRing(ctx, ring);
          } else if (geometry.type === "MultiPolygon") {
            for (const polygon of geometry.coordinates || []) {
              if (polygonMaxLat(polygon) < MAP_MIN_LAT) continue;
              for (const ring of polygon || []) drawProjectedRing(ctx, ring);
            }
          }
        }
        ctx.fill("evenodd");
      }
      function drawFallbackMask(ctx) {
        ctx.beginPath();
        for (const polygon of WORLD_LAND_POLYGONS) drawProjectedRing(ctx, polygon);
        ctx.fill("evenodd");
      }
      async function loadWorldGeoJson() {
        if (cachedWorldGeoJson) return cachedWorldGeoJson;
        const response = await fetch(WORLD_GEOJSON_URL, { cache: "force-cache", headers: { accept: "application/geo+json,application/json" } });
        if (!response.ok) throw new Error(`${WORLD_GEOJSON_URL} -> ${response.status}`);
        cachedWorldGeoJson = await response.json();
        return cachedWorldGeoJson;
      }
      async function renderWorldDotMap() {
        const canvas = document.getElementById("map-canvas");
        const ctx = canvas?.getContext("2d");
        if (!canvas || !ctx) return;
        canvas.width = MAP_WIDTH;
        canvas.height = MAP_HEIGHT;
        const maskCanvas = document.createElement("canvas");
        maskCanvas.width = MAP_WIDTH;
        maskCanvas.height = MAP_HEIGHT;
        const mask = maskCanvas.getContext("2d", { willReadFrequently: true });
        if (!mask) return;
        mask.clearRect(0, 0, MAP_WIDTH, MAP_HEIGHT);
        mask.fillStyle = "#fff";
        try {
          drawGeoJsonMask(mask, await loadWorldGeoJson());
        } catch (error) {
          console.warn("failed to load high precision map; using built-in fallback", error);
          drawFallbackMask(mask);
        }
        const pixels = mask.getImageData(0, 0, MAP_WIDTH, MAP_HEIGHT).data;
        ctx.clearRect(0, 0, MAP_WIDTH, MAP_HEIGHT);
        ctx.fillStyle = mapDotColor();
        ctx.beginPath();
        for (let y = 0; y < MAP_HEIGHT; y += MAP_DOT_GAP) {
          for (let x = 0; x < MAP_WIDTH; x += MAP_DOT_GAP) {
            const index = ((y | 0) * MAP_WIDTH + (x | 0)) * 4;
            if (pixels[index] === 0 && pixels[index + 3] === 0) continue;
            ctx.moveTo(x + MAP_DOT_SIZE, y);
            ctx.arc(x, y, MAP_DOT_SIZE, 0, Math.PI * 2);
          }
        }
        ctx.fill();
      }

      function renderMapDots(nodes) {
        const root = document.getElementById("map-dots");
        root.innerHTML = nodes
          .map((node) => {
            const pos = nodePosition(node);
            const status = nodeStatusKey(node);
            const label = `${node.identity.node_label} · ${statusLabel(status)}`;
            return `<div class="map-dot ${status}" style="left:${(pos.x * 100).toFixed(2)}%;top:${(pos.y * 100).toFixed(2)}%" title="${escapeHtml(label)}"></div>`;
          })
          .join("");
      }

      function aggregateSeries(history, field, bucketMs = HOME_SPARK_BUCKET_MS) {
        if (!Array.isArray(history) || history.length === 0) return [];
        const buckets = new Map();
        for (const point of history) {
          const value = Number(point[field]);
          if (!Number.isFinite(value)) continue;
          const bucket = Math.floor(point._ts / bucketMs) * bucketMs;
          const item = buckets.get(bucket) || { sum: 0, count: 0 };
          item.sum += value;
          item.count += 1;
          buckets.set(bucket, item);
        }
        return [...buckets.entries()]
          .sort((left, right) => left[0] - right[0])
          .map(([, item]) => item.sum / item.count);
      }
      async function refreshSparkHistories(nodes) {
        const limited = nodes.slice(0, HOME_SPARK_NODE_LIMIT);
        await Promise.all(limited.map(async (node) => {
          const nodeId = node.identity.node_id;
          const params = new URLSearchParams({
            window_hours: String(HOME_SPARK_WINDOW_HOURS),
            max_points: String(HOME_SPARK_MAX_POINTS)
          });
          try {
            const history = normalizeHistory(await fetchJson(`/api/nodes/${encodeURIComponent(nodeId)}/history?${params.toString()}`));
            sparkHistory.set(nodeId, history);
          } catch (error) {
            console.warn("failed to refresh node spark history", nodeId, error);
          }
        }));
      }
      function nodeSparkPoints(node) {
        const history = sparkHistory.get(node.identity.node_id);
        const points = aggregateSeries(history, "cpu_usage_percent");
        if (points.length > 0) return points;
        const current = Number(node.snapshot?.cpu_usage_percent);
        return Number.isFinite(current) ? [current] : [];
      }
      function sparklineSvg(points, color) {
        if (!Array.isArray(points) || points.length < 2) {
          return `<svg viewBox="0 0 200 60" preserveAspectRatio="none" aria-hidden="true">
            <line x1="0" y1="48" x2="200" y2="48" stroke="${color}" stroke-width="1" stroke-opacity="0.28" />
          </svg>`;
        }
        const w = 200, h = 60, padY = 8;
        const min = Math.min(...points);
        const max = Math.max(...points);
        const span = Math.max(max - min, 1);
        const stepX = w / (points.length - 1);
        const coords = points.map((value, idx) => {
          const x = idx * stepX;
          const y = h - padY - ((value - min) / span) * (h - padY * 2);
          return [x, y];
        });
        const line = smoothPath(coords);
        const area = `${line} L ${w},${h} L 0,${h} Z`;
        return `<svg viewBox="0 0 ${w} ${h}" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <linearGradient id="sparkGrad-${color.replace(/[^a-z0-9]/gi, "")}" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="${color}" stop-opacity="0.24" />
              <stop offset="100%" stop-color="${color}" stop-opacity="0" />
            </linearGradient>
          </defs>
          <path d="${area}" fill="url(#sparkGrad-${color.replace(/[^a-z0-9]/gi, "")})" />
          <path d="${line}" fill="none" stroke="${color}" stroke-width="1.1" stroke-linecap="round" stroke-linejoin="round" vector-effect="non-scaling-stroke" />
        </svg>`;
      }
      function sparklineColor(status) {
        if (status === "offline") return "#ef4444";
        if (status === "latency") return "#eab308";
        return "#22c55e";
      }
      function smoothPath(coords) {
        if (!coords.length) return "";
        if (coords.length === 1) {
          const [x, y] = coords[0];
          return `M${x.toFixed(1)},${y.toFixed(1)}`;
        }
        let path = `M${coords[0][0].toFixed(1)},${coords[0][1].toFixed(1)}`;
        for (let i = 0; i < coords.length - 1; i++) {
          const p0 = coords[i - 1] || coords[i];
          const p1 = coords[i];
          const p2 = coords[i + 1];
          const p3 = coords[i + 2] || p2;
          const cp1x = p1[0] + (p2[0] - p0[0]) / 6;
          const cp1y = p1[1] + (p2[1] - p0[1]) / 6;
          const cp2x = p2[0] - (p3[0] - p1[0]) / 6;
          const cp2y = p2[1] - (p3[1] - p1[1]) / 6;
          path += ` C${cp1x.toFixed(1)},${cp1y.toFixed(1)} ${cp2x.toFixed(1)},${cp2y.toFixed(1)} ${p2[0].toFixed(1)},${p2[1].toFixed(1)}`;
        }
        return path;
      }

      function renderStats(overview) {
        document.getElementById("stat-total").textContent = overview.total_nodes;
        document.getElementById("stat-online").textContent = overview.online_nodes;
        document.getElementById("stat-offline").textContent = overview.offline_nodes;
        const latency = overview.average_latency_ms;
        const latencyEl = document.getElementById("stat-latency");
        if (latency == null) {
          latencyEl.innerHTML = `--<small class="value-unit"> ms</small>`;
        } else {
          latencyEl.innerHTML = `${Math.round(latency)}<small class="value-unit"> ms</small>`;
        }
        document.getElementById("page-subtitle").textContent = t("index.subtitle", { count: overview.online_nodes });
      }

      function renderUpdated(overview) {
        document.getElementById("updated-at").textContent = overview
          ? fmtRelative(overview.generated_at)
          : t("common.waiting_for_data");
      }

      function renderMatrix(nodes) {
        const root = document.getElementById("latency-matrix");
        if (!nodes.length) {
          root.innerHTML = `<div class="empty">${escapeHtml(t("index.matrix.empty"))}</div>`;
          return;
        }
        const sorted = [...nodes].sort((a, b) => (a.identity.node_label || "").localeCompare(b.identity.node_label || ""));
        const limited = sorted.slice(0, 10);
        const rows = limited
          .map((node) => {
            const cpu = node.snapshot?.cpu_usage_percent;
            const mem = node.snapshot?.memory ? (node.snapshot.memory.used_bytes / Math.max(node.snapshot.memory.total_bytes, 1)) * 100 : null;
            const lat = node.latency_ms;
            const latColor = latencyColor(lat);
            const cpuClr = cpuColor(cpu);
            const memClr = memColor(mem);
            return `<tr>
              <td class="row-head">${escapeHtml(node.identity.node_label || node.identity.node_id)}</td>
              <td><div class="matrix-cell" style="background:${latColor.bg};color:${latColor.fg}">${lat == null ? "—" : Math.round(lat)}</div></td>
              <td><div class="matrix-cell" style="background:${cpuClr.bg};color:${cpuClr.fg}">${cpu == null ? "—" : `${cpu.toFixed(0)}%`}</div></td>
              <td><div class="matrix-cell" style="background:${memClr.bg};color:${memClr.fg}">${mem == null ? "—" : `${mem.toFixed(0)}%`}</div></td>
            </tr>`;
          })
          .join("");
        root.innerHTML = `<table class="matrix-table">
          <thead>
            <tr>
              <th class="row-head"></th>
              <th data-i18n="index.matrix.col_current">RTT</th>
              <th data-i18n="index.node.cpu">CPU</th>
              <th data-i18n="index.node.memory">Memory</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>`;
        root.querySelectorAll("[data-i18n]").forEach((el) => { el.textContent = t(el.dataset.i18n); });
      }

      function cpuColor(value) {
        if (value == null) return { bg: "var(--bg-card-soft)", fg: "var(--text-dim)" };
        if (value < 40) return { bg: "rgba(34,197,94,0.18)", fg: "#22c55e" };
        if (value < 70) return { bg: "rgba(234,179,8,0.18)", fg: "#facc15" };
        if (value < 85) return { bg: "rgba(249,115,22,0.18)", fg: "#fb923c" };
        return { bg: "rgba(239,68,68,0.20)", fg: "#f87171" };
      }
      function memColor(value) {
        return cpuColor(value);
      }

      function renderNodes(nodes) {
        const root = document.getElementById("nodes");
        if (!nodes.length) {
          root.innerHTML = `<div class="empty">${escapeHtml(t("index.no_agents"))}</div>`;
          return;
        }
        root.innerHTML = `<div class="node-grid">${nodes.map((node) => nodeCardHtml(node)).join("")}</div>`;
      }

      function nodeCardHtml(node) {
        const snapshot = node.snapshot || {};
        const memory = snapshot.memory || {};
        const status = nodeStatusKey(node);
        const sparkColor = sparklineColor(status);
        const points = nodeSparkPoints(node);
        const cpu = snapshot.cpu_usage_percent;
        const load = snapshot.load?.one;
        const label = node.identity.node_label || node.identity.node_id;
        const id = node.identity.node_id;
        const title = label && label !== id ? `${label}: ${id}` : id;
        return `<a class="node-card" href="/nodes/${encodeURIComponent(node.identity.node_id)}">
          <div class="node-card-head">
            <div class="node-card-title">
              <span class="flag">${nodeFlag(node)}</span>
              <span>${escapeHtml(title)}</span>
            </div>
            <span class="badge ${status}">${escapeHtml(statusLabel(status))}</span>
          </div>
          <div class="node-metrics">
            <div class="node-metric">
              <div class="label" data-i18n="index.node.latency">RTT</div>
              <div class="value">${node.latency_ms == null ? "—" : `${Math.round(node.latency_ms)} ms`}</div>
            </div>
            <div class="node-metric">
              <div class="label" data-i18n="index.node.load">Load</div>
              <div class="value">${load == null ? "—" : load.toFixed(2)}</div>
            </div>
            <div class="node-metric">
              <div class="label" data-i18n="index.node.cpu">CPU</div>
              <div class="value ${cpu != null && cpu >= 80 ? "accent-red" : cpu != null && cpu >= 50 ? "accent-yellow" : "accent-green"}">${cpu == null ? "—" : `${cpu.toFixed(0)}%`}</div>
            </div>
          </div>
          <div class="node-spark" style="color:${sparkColor}">${sparklineSvg(points, sparkColor)}</div>
        </a>`;
      }

      function applyChrome() {
        document.documentElement.lang = currentLanguage;
        document.title = t("index.page_title");
        document.querySelectorAll("[data-i18n]").forEach((el) => {
          el.textContent = t(el.dataset.i18n);
        });
        if (latestOverview) {
          document.getElementById("page-subtitle").textContent = t("index.subtitle", { count: latestOverview.online_nodes });
        }
      }

      async function fetchJson(url) {
        const r = await fetch(url, { headers: { accept: "application/json" } });
        if (!r.ok) throw new Error(`${url} -> ${r.status}`);
        return r.json();
      }
      async function refresh() {
        if (document.hidden) {
          if (refreshTimer != null) window.clearTimeout(refreshTimer);
          refreshTimer = window.setTimeout(refresh, REFRESH_MS);
          return;
        }
        try {
          const [overview, nodes] = await Promise.all([
            fetchJson("/api/overview"),
            fetchJson("/api/nodes"),
          ]);
          latestOverview = overview;
          latestNodes = nodes;
          await refreshSparkHistories(nodes);
          renderStats(overview);
          renderUpdated(overview);
          renderMapDots(nodes);
          renderMatrix(nodes);
          renderNodes(nodes);
        } catch (error) {
          document.getElementById("nodes").innerHTML = `<div class="empty">${escapeHtml(t("index.dashboard_load_failed", { error: error.message }))}</div>`;
        } finally {
          if (refreshTimer != null) window.clearTimeout(refreshTimer);
          refreshTimer = window.setTimeout(refresh, REFRESH_MS);
        }
      }

      async function init() {
        await loadI18n();
        applyTheme(loadStoredTheme() || "dark");
        bindThemeToggle();
        bindLanguageSelector(() => {
          applyChrome();
          if (latestOverview) { renderStats(latestOverview); renderUpdated(latestOverview); }
          renderMatrix(latestNodes);
          renderNodes(latestNodes);
        });
        applyChrome();
        renderWorldDotMap();
        document.addEventListener("visibilitychange", () => {
          if (document.hidden) return;
          if (refreshTimer != null) { window.clearTimeout(refreshTimer); refreshTimer = null; }
          refresh();
        });
        refresh();
        window.setInterval(() => { if (latestOverview) renderUpdated(latestOverview); }, 30000);
      }
      init();
    </script>
  </body>
</html>
