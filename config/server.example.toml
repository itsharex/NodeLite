# Server 配置示例。完整字段说明见 nodelite-proto/src/config.rs 中的 ServerConfig。

[server]
# 进程监听地址。生产部署通常监听 127.0.0.1,由前置 Nginx / Caddy 终止 TLS。
listen = "127.0.0.1:8080"
# 对外可访问的基地址,供前端与 Agent 推导 ws/wss、安装脚本 URL。
public_base_url = "https://monitor.example.com"
# 仅当你确实需要让面板以明文 HTTP 暴露(例如没有 TLS 终止的隔离测试环境)时
# 才设置为 true。生产环境务必保持 false。
insecure_allow_http = false
# 节点凭证文件;Server 与 CLI 都会读写它。
node_registry_path = "./config/server.json"
# 历史数据 SQLite 文件,缺失时会在启动时自动创建。
history_db_path = "./data/history.sqlite3"
# 运行态快照文件,用于 Server 重启后秒级恢复最近视图。
snapshot_path = "./data/snapshot.json"
# 多少秒未收到心跳即视为节点离线。
stale_after_secs = 20
# Server 主动向 Agent 发送 Ping 的间隔(秒),决定 RTT 测量频率。
ping_interval_secs = 10
# WebSocket 单帧最大字节数,防止异常 Agent 发巨型负载。
max_message_bytes = 65536
# WebSocket Hello 握手超时(秒)。
hello_timeout_secs = 10
# 最大未响应 Ping 数量。
max_outstanding_pings = 32
# 不安全传输警告间隔(秒)。
insecure_transport_warn_interval_secs = 900
# 最大磁盘数量限制。
max_sanitized_disks = 64
# 最大字符串字节数限制。
max_sanitized_string_bytes = 256
# 指标异常会话限制。
metric_anomaly_session_limit = 5
# SQLite 忙等待超时(秒)。
sqlite_busy_timeout_secs = 5

[auth]
# 前端只读访问用的基本认证用户名。
username = "viewer"
# 对应密码,生产环境务必修改,不要沿用默认值。
password = "change-this-password"
# 可选:开启 TOTP 二次验证。开启后需要先通过 Basic Auth,再输入 6 位动态码。
enable_2fa = false
# 可选:TOTP base32 secret。仅在 enable_2fa = true 时必须配置。
# totp_secret = "JBSWY3DPEHPK3PXP"

[audit]
# 安全审计日志开关。关闭后不再写入 /api/audit-log 也会返回 503。
enabled = true
# 审计日志 SQLite 文件。
db_path = "./data/audit.sqlite3"
# 仅保留最近 N 天的安全事件。
retention_days = 90
# 是否记录成功认证/握手事件。
log_successful_auth = true
# 是否记录失败认证/TOTP 失败事件。
log_failed_auth = true
# 是否记录 token 误用或失效事件。
log_token_events = true
# 是否记录安装/登录等路径触发的限流事件。
log_rate_limit = true

[ws]
# 全局并发 WebSocket 连接上限。
max_total_connections = 1024
# 单个客户端 IP 的并发连接上限。
max_connections_per_ip = 32
# 认证失败统计窗口(秒),超出窗口的失败记录会被清理。
auth_fail_window_secs = 300
# 窗口内允许的最大失败次数,达到后触发临时封禁。
auth_fail_max_attempts = 12
# 触发封禁后该 IP 被禁止重连的时长(秒)。
auth_block_secs = 900

[ui]
# 前端轮询接口刷新的间隔(秒),数据从 SharedState 实时返回。
refresh_interval_secs = 5

[filters]
# 这里列出的文件系统类型会从磁盘视图中过滤掉,避免容器/虚拟挂载干扰统计。
ignored_filesystems = ["tmpfs", "devtmpfs", "overlay"]
