# Server 配置示例。完整字段说明见 nodelite-proto/src/config.rs 中的 ServerConfig。

[server]
# 进程监听地址。生产部署通常监听 127.0.0.1,由前置 Nginx / Caddy 终止 TLS。
listen = "127.0.0.1:8080"
# 对外可访问的基地址,供前端与 Agent 推导 ws/wss、安装脚本 URL。
public_base_url = "https://monitor.example.com"
# 仅当你确实需要让面板以明文 HTTP 暴露(例如没有 TLS 终止的隔离测试环境)时
# 才设置为 true。生产环境务必保持 false。
insecure_allow_http = false
# 远端反向代理/WAF 的可信 CIDR。只有当直连 peer 命中这里(或是 loopback)
# 时,NodeLite 才会解析 X-Forwarded-For / X-Real-IP。留空表示仅信任本机反代。
trusted_proxies = []
# 节点凭证文件;Server 与 CLI 都会读写它。
node_registry_path = "./config/server.json"
# 历史数据 SQLite 文件,缺失时会在启动时自动创建。
# 历史图是按写入间隔采样的趋势数据,不是完整 metrics 归档;队列满时会优先实时视图并丢弃历史点。
# 如果 /metrics 中 nodelite_history_dropped_writes_total 持续增长,说明历史写入跟不上上报速率或磁盘 I/O。
history_db_path = "./data/history.sqlite3"
# 运行态快照文件,用于 Server 重启后秒级恢复最近视图。
snapshot_path = "./data/snapshot.json"
# 多少秒未收到心跳即视为节点离线。
stale_after_secs = 20
# Server 主动向 Agent 发送 Ping 的间隔(秒),决定 RTT 测量频率。
ping_interval_secs = 10
# WebSocket 单帧最大字节数,防止异常 Agent 发巨型负载。
max_message_bytes = 65536
# WebSocket Hello 握手超时(秒)。
hello_timeout_secs = 10
# 最大未响应 Ping 数量。
max_outstanding_pings = 32
# 不安全传输警告间隔(秒)。
insecure_transport_warn_interval_secs = 900
# 最大磁盘数量限制。
max_sanitized_disks = 64
# 最大字符串字节数限制。
max_sanitized_string_bytes = 256
# 指标异常会话限制。
metric_anomaly_session_limit = 5
# SQLite 忙等待超时(秒)。
sqlite_busy_timeout_secs = 5

[metrics]
# Prometheus 默认只导出 server/overview 与少量 node summary 指标,避免大规模 scrape 构建过大的文本体。
# 开启后会额外按节点导出 CPU、uptime、memory、load、network 等最新快照细节。
export_node_resource_metrics = false
# 开启后会按节点和挂载点导出磁盘字节数与使用率;节点多或挂载点多时 series/body 会快速增长。
export_node_disk_metrics = false

[auth]
# 前端只读访问用的基本认证用户名。
username = "viewer"
# 对应密码,生产环境务必修改,不要沿用默认值。
password = "change-this-password"
# 可选:开启 TOTP 二次验证。开启后需要先通过 Basic Auth,再输入 6 位动态码。
enable_2fa = false
# 可选:TOTP base32 secret。仅在 enable_2fa = true 时必须配置。
# totp_secret = "JBSWY3DPEHPK3PXP"

[audit]
# 安全审计日志开关。关闭后不再写入 /api/audit-log 也会返回 503。
enabled = true
# 审计日志 SQLite 文件。
db_path = "./data/audit.sqlite3"
# 仅保留最近 N 天的安全事件。
retention_days = 90
# 是否记录成功认证/握手事件。
log_successful_auth = true
# 是否记录失败认证/TOTP 失败事件。
log_failed_auth = true
# 是否记录 token 误用或失效事件。
log_token_events = true
# 是否记录安装/登录等路径触发的限流事件。
log_rate_limit = true

[geoip]
# 自动根据 Agent 连接 IP 推断国家/地区。默认开启;需要完全关闭时改为 false。
enabled = true
# provider = "dbip" 会使用 DB-IP Lite; provider = "custom" 时只读取本地 database_path。
provider = "dbip"
# country-lite 只提供国家; city-lite 会额外填充 city/latitude/longitude。
edition = "country-lite"
# MaxMind DB 格式的 .mmdb 文件路径。中性文件名可同时用于 country-lite / city-lite。
database_path = "./data/geoip/dbip.mmdb"
# 启动后后台检查并下载 DB-IP Lite 数据库,失败只记录 warning,不阻塞服务启动。
auto_update = true
# 本地数据库超过该天数后才会重新下载。
update_interval_days = 30

[install]
# 可选:覆盖 install-agent / upgrade-agent 使用的 release 基地址。
agent_release_base_url = "https://downloads.example.com/nodelite/releases/latest/download"
# 当配置了 agent_release_base_url 时,两个架构的 SHA256 都必须同时提供。
agent_release_sha256_x86_64 = "0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef"
agent_release_sha256_aarch64 = "abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789"

[alerts]
# 告警功能总开关。打开后可以通过 Web UI 配置规则与渠道。
enabled = false

[alerts.smtp]
# SMTP 渠道开关。配置完整后可用于邮件告警与巡检摘要。
enabled = false
host = ""
port = 587
username = ""
# password = ""
sender = ""
recipients = []
transport = "start_tls"
send_resolved = true

[alerts.webhook]
# WebHook 渠道开关。建议配合独立机器人入口或告警平台使用。
enabled = false
url = ""
# secret = ""
send_resolved = true

[alerts.inspection]
# 每日巡检摘要配置。默认关闭。
enabled = false
local_time = "09:00"
lookback_hours = 24
delivery = ["smtp"]
offline_grace_minutes = 10
latency_warn_ms = 250
cpu_warn_percent = 85
memory_warn_percent = 90

[[alerts.rules]]
# 规则 ID 需要稳定且唯一，便于后续调整和审计。
id = "cpu-hot"
name = "CPU 持续过高"
enabled = true
metric = "cpu_usage_percent"
comparator = "gt"
threshold = 85
window_minutes = 5
severity = "critical"
scope_mode = "all"
node_ids = []
tags = []
delivery = ["smtp", "webhook"]
cooldown_minutes = 30
send_resolved = true

[ws]
# 全局并发 WebSocket 连接上限。
max_total_connections = 1024
# 单个客户端 IP 的并发连接上限。
max_connections_per_ip = 32
# 认证失败统计窗口(秒),超出窗口的失败记录会被清理。
auth_fail_window_secs = 300
# 窗口内允许的最大失败次数,达到后触发临时封禁。
auth_fail_max_attempts = 12
# 触发封禁后该 IP 被禁止重连的时长(秒)。
auth_block_secs = 900

[ui]
# 前端轮询接口刷新的间隔(秒),数据从 SharedState 实时返回。
refresh_interval_secs = 5

[filters]
# 这里列出的文件系统类型会从磁盘视图中过滤掉,避免容器/虚拟挂载干扰统计。
ignored_filesystems = ["tmpfs", "devtmpfs", "overlay"]
