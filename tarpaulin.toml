# cargo-tarpaulin 覆盖率配置
# 运行: cargo tarpaulin --config tarpaulin.toml
# 文档: https://github.com/xd009642/tarpaulin

[default]
# 排除测试辅助代码(它们本身不需要被覆盖)
exclude-files = [
    "nodelite-server/src/load_test.rs",
    "nodelite-server/src/test_support.rs",
]

# 覆盖 workspace 内所有 crate
workspace = true

# 输出格式
out = ["Xml", "Html"]
output-dir = "target/tarpaulin"

# 超时:集成测试可能较慢
timeout = "300s"

# 关键模块补完覆盖后,把全仓最低门槛抬到 75%,避免后续回归。
fail-under = 75
