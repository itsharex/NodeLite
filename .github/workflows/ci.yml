# 持续集成工作流:每次推送到 main 或提交 PR 时运行,负责风格检查、单测与跨平台构建。
name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    name: Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        # 安装最小化的 stable 工具链,并加上 clippy / rustfmt 组件。
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-lint-and-test
          workspaces: |
            . -> target

      - name: Install shellcheck
        # 用于检查 install-*.sh 中是否存在 POSIX shell 风险写法。
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Check formatting
        # 严格校验 cargo fmt 的格式约定,任何差异都会失败。
        run: cargo fmt --all --check

      - name: Run clippy
        # 使用 --locked + 把所有 warning 当作错误,避免在 CI 中悄悄引入新警告。
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --locked

      - name: Shellcheck installers
        run: shellcheck scripts/install-server.sh scripts/install-agent.sh

      - name: Audit dependency advisories
        # 发布前之外,日常 CI 也要尽早暴露已知 RUSTSEC / yanked 依赖问题。
        run: cargo audit --deny warnings

      - name: Check dependency policy
        run: cargo deny check advisories licenses bans

  msrv:
    name: MSRV Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust MSRV
        run: |
          rustup toolchain install 1.88.0 --profile minimal
          rustup default 1.88.0

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-msrv
          workspaces: |
            . -> target

      - name: Run tests with MSRV
        run: cargo test --workspace --locked

  web-lint-and-test:
    # 前端 Stage 0 守门:lint / typecheck / 单测 / 构建,以及 CSP 内联脚本守卫。
    # Stage 1 接入 build.rs 后,Rust 侧会通过 NODELITE_SKIP_WEB_BUILD=1 复用这里的 dist/。
    name: Web Lint and Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: nodelite-server/web

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        # 必须先装 pnpm,setup-node 的 cache: pnpm 才能找到它。
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: nodelite-server/web/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Guard against bulk inline scripts (CSP)
        # 短的引导 shim(主题防闪烁 + 24h auth 检查)允许放行,任何 >800 字符的
        # 内联 <script>(例如 Vite 误注入的 modulePreload polyfill、误塞进来的
        # 业务 JS)判失败。
        # Stage 4 必须用 vite-plugin-csp-guard(或等价物)计算 sha256 + 注入响
        # 应头,把这一守卫升级为严格的 script-src 'self' 'sha256-...'。
        run: |
          if perl -ne 'BEGIN{$/=undef} exit 1 if /<script>[^<]{800,}/' dist/index.html; then
            echo "inline-script guard: ok"
          else
            echo "::error::dist/index.html contains an inline <script> longer than 800 chars"
            exit 1
          fi

  cross-build:
    # 跨平台构建:确保发布前 musl 目标都能编译通过。
    name: Cross Build ${{ matrix.target }}
    needs: [lint-and-test, msrv]
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-cross-${{ matrix.target }}
          workspaces: |
            . -> target

      - name: Install cross
        # 使用 cross 容器化交叉编译,免去手动准备 musl sysroot。
        uses: taiki-e/install-action@cross

      - name: Disable local linker overrides for CI cross build
        # 本地 .cargo/config.toml 里写死了 rust-lld 路径,CI 镜像里没有,所以临时改名。
        run: |
          if [ -f .cargo/config.toml ]; then
            mv .cargo/config.toml .cargo/config.toml.ci-bak
          fi

      - name: Cross build release binaries
        run: |
          cross build --locked --release --target "${{ matrix.target }}" \
            -p nodelite-server \
            -p nodelite-agent

  agent-macos-build:
    # 先只验证 Agent 的官方 macOS 构建目标,避免把 server/安装链路一起扩大。
    name: Agent macOS Build ${{ matrix.target }}
    needs: [lint-and-test, msrv]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-agent-macos-${{ matrix.target }}
          workspaces: |
            . -> target

      - name: Build agent for macOS release target
        # CI 先以编译通过为目标,真正的发布二进制仍在 release workflow 里产出。
        run: cargo check --locked --target "${{ matrix.target }}" -p nodelite-agent
