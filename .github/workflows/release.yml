# 发布工作流:在打 tag 或手动触发时构建 musl 二进制并发布 GitHub Release。
name: Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish
        required: true
        type: string

permissions:
  # 发布 Release 需要写权限。
  contents: write

env:
  # 兼容"tag 推送触发"与"手动指定 tag"两种入口。
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  validate:
    # 先对将要发布的 tag 做完整校验;任何失败都会阻止后续 release。
    name: Validate release tag
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: nodelite-server/web/pnpm-lock.yaml

      - name: Build web assets
        working-directory: nodelite-server/web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Set up Rust
        # 发布前和 CI 一样要求 rustfmt / clippy 都通过。
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup component add clippy rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-validate
          workspaces: |
            . -> target

      - name: Install shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck

      - name: Install cargo-audit
        uses: taiki-e/install-action@cargo-audit

      - name: Install cargo-deny
        uses: taiki-e/install-action@cargo-deny

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run clippy
        env:
          NODELITE_SKIP_WEB_BUILD: 1
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Run tests
        env:
          NODELITE_SKIP_WEB_BUILD: 1
        run: cargo test --workspace --locked

      - name: Shellcheck installers
        run: shellcheck scripts/install-server.sh scripts/install-agent.sh

      - name: Audit dependency advisories
        run: cargo audit --deny warnings

      - name: Check dependency policy
        run: cargo deny check advisories

  build-linux:
    # 针对 x86_64 / aarch64 两个 musl 目标分别构建。
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - name: Check out repository
        # fetch-depth=0 让 cross 等工具能看到完整历史;ref 强制 checkout 到 release tag。
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.11.0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: nodelite-server/web/pnpm-lock.yaml

      - name: Build web assets
        working-directory: nodelite-server/web
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          workspaces: |
            . -> target

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Warm cross image with retries
        # GHCR 偶发超时会让 cross 首次拉镜像失败;先显式重试拉取,减少 release 偶发红灯。
        run: |
          cross_version="$(cross --version | awk 'NR==1 {print $2}')"
          image="ghcr.io/cross-rs/${{ matrix.target }}:${cross_version}"
          for attempt in 1 2 3; do
            if docker pull "$image"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "failed to pull $image after $attempt attempts" >&2
              exit 1
            fi
            sleep $((attempt * 10))
          done

      - name: Disable local linker overrides for CI cross build
        # 与 CI 工作流相同:暂时挪开本地的 linker 配置,避免与 cross 容器冲突。
        run: |
          if [ -f .cargo/config.toml ]; then
            mv .cargo/config.toml .cargo/config.toml.ci-bak
          fi

      - name: Build release binaries
        # 通过 NODELITE_BUILD_VERSION 把 tag 注入二进制,便于运行时打印版本号。
        # NODELITE_SKIP_WEB_BUILD=1 因为前端资源已在前面步骤构建完成。
        run: |
          NODELITE_BUILD_VERSION="${RELEASE_TAG#v}" \
          NODELITE_SKIP_WEB_BUILD=1 \
          cross build --locked --release --target "${{ matrix.target }}" \
            -p nodelite-server \
            -p nodelite-agent

      - name: Collect release assets
        # 把构建产物拷贝到 dist/ 并生成对应的 SHA256 校验文件。
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/nodelite-server" "dist/nodelite-server-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/nodelite-agent" "dist/nodelite-agent-${{ matrix.target }}"
          sha256sum \
            "dist/nodelite-server-${{ matrix.target }}" \
            "dist/nodelite-agent-${{ matrix.target }}" \
            > "dist/SHA256SUMS-${{ matrix.target }}.txt"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/nodelite-server-${{ matrix.target }}
            dist/nodelite-agent-${{ matrix.target }}
            dist/SHA256SUMS-${{ matrix.target }}.txt

      - name: Upload installer scripts
        # 安装脚本只需要随某一个架构上传一次。
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: actions/upload-artifact@v4
        with:
          name: release-scripts
          path: |
            scripts/install-server.sh
            scripts/install-agent.sh

  build-agent-macos:
    # 先只发布 Agent 的 macOS 二进制,server 仍保持 Linux 官方发布范围。
    name: Build agent ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15-intel
            target: x86_64-apple-darwin
          - runner: macos-15
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable
          rustup target add "${{ matrix.target }}"

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-agent-macos-${{ matrix.target }}
          workspaces: |
            . -> target

      - name: Build release agent binary
        run: |
          NODELITE_BUILD_VERSION="${RELEASE_TAG#v}" \
          cargo build --locked --release --target "${{ matrix.target }}" -p nodelite-agent

      - name: Collect release assets
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/nodelite-agent" "dist/nodelite-agent-${{ matrix.target }}"
          shasum -a 256 \
            "dist/nodelite-agent-${{ matrix.target }}" \
            > "dist/SHA256SUMS-${{ matrix.target }}.txt"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-agent-${{ matrix.target }}
          path: |
            dist/nodelite-agent-${{ matrix.target }}
            dist/SHA256SUMS-${{ matrix.target }}.txt

  release:
    # 汇总产物 → 合并校验文件 → 写入 GitHub Release。
    name: Publish GitHub Release
    needs:
      - build-linux
      - build-agent-macos
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Merge checksums
        # 把每个架构的 SHA256SUMS 合并为统一的 SHA256SUMS.txt,供安装脚本下载。
        run: |
          find release-assets -type f -name 'SHA256SUMS-*.txt' | sort | xargs cat > release-assets/SHA256SUMS.txt

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          if ! gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --repo "$GH_REPO" \
              --title "NodeLite $TAG_NAME" \
              --generate-notes
          fi

          gh release upload "$TAG_NAME" \
            --repo "$GH_REPO" \
            release-assets/release-x86_64-unknown-linux-musl/nodelite-server-x86_64-unknown-linux-musl \
            release-assets/release-x86_64-unknown-linux-musl/nodelite-agent-x86_64-unknown-linux-musl \
            release-assets/release-aarch64-unknown-linux-musl/nodelite-server-aarch64-unknown-linux-musl \
            release-assets/release-aarch64-unknown-linux-musl/nodelite-agent-aarch64-unknown-linux-musl \
            release-assets/release-agent-x86_64-apple-darwin/nodelite-agent-x86_64-apple-darwin \
            release-assets/release-agent-aarch64-apple-darwin/nodelite-agent-aarch64-apple-darwin \
            release-assets/release-scripts/install-server.sh \
            release-assets/release-scripts/install-agent.sh \
            release-assets/SHA256SUMS.txt \
            --clobber
