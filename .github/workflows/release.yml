# 发布工作流:在打 tag 或手动触发时构建 musl 二进制并发布 GitHub Release。
name: Release

on:
  push:
    tags:
      - "*.*.*"
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to build and publish
        required: true
        type: string

permissions:
  # 发布 Release 需要写权限。
  contents: write

env:
  # 兼容"tag 推送触发"与"手动指定 tag"两种入口。
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  build:
    # 针对 x86_64 / aarch64 两个 musl 目标分别构建。
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl

    steps:
      - name: Check out repository
        # fetch-depth=0 让 cross 等工具能看到完整历史;ref 强制 checkout 到 release tag。
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - name: Set up Rust
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: release-${{ matrix.target }}
          workspaces: |
            . -> target

      - name: Stamp workspace version from tag
        # Make Cargo metadata and build logs show the released tag version,
        # not the static development placeholder from the repository.
        env:
          RELEASE_TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          export RELEASE_VERSION="${RELEASE_TAG_NAME#v}"
          python3 - <<'PY'
          import os
          import re
          from pathlib import Path

          release_version = os.environ["RELEASE_VERSION"]
          cargo_toml = Path("Cargo.toml")
          content = cargo_toml.read_text()
          pattern = re.compile(
              r"(\[workspace\.package\]\s+version\s*=\s*\")([^\"]+)(\")",
              re.MULTILINE,
          )
          updated, count = pattern.subn(rf"\g<1>{release_version}\g<3>", content, count=1)
          if count != 1:
              raise SystemExit("failed to stamp workspace.package.version in Cargo.toml")
          cargo_toml.write_text(updated)
          PY

      - name: Install cross
        uses: taiki-e/install-action@cross

      - name: Disable local linker overrides for CI cross build
        # 与 CI 工作流相同:暂时挪开本地的 linker 配置,避免与 cross 容器冲突。
        run: |
          if [ -f .cargo/config.toml ]; then
            mv .cargo/config.toml .cargo/config.toml.ci-bak
          fi

      - name: Build release binaries
        # 通过 XIMONITOR_BUILD_VERSION 把 tag 注入二进制,便于运行时打印版本号。
        run: |
          XIMONITOR_BUILD_VERSION="${RELEASE_TAG#v}" \
          cross build --locked --release --target "${{ matrix.target }}" \
            -p ximonitor-server \
            -p ximonitor-agent

      - name: Collect release assets
        # 把构建产物拷贝到 dist/ 并生成对应的 SHA256 校验文件。
        run: |
          mkdir -p dist
          cp "target/${{ matrix.target }}/release/ximonitor-server" "dist/ximonitor-server-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/ximonitor-agent" "dist/ximonitor-agent-${{ matrix.target }}"
          sha256sum \
            "dist/ximonitor-server-${{ matrix.target }}" \
            "dist/ximonitor-agent-${{ matrix.target }}" \
            > "dist/SHA256SUMS-${{ matrix.target }}.txt"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/ximonitor-server-${{ matrix.target }}
            dist/ximonitor-agent-${{ matrix.target }}
            dist/SHA256SUMS-${{ matrix.target }}.txt

      - name: Upload installer scripts
        # 安装脚本只需要随某一个架构上传一次。
        if: matrix.target == 'x86_64-unknown-linux-musl'
        uses: actions/upload-artifact@v4
        with:
          name: release-scripts
          path: |
            scripts/install-server.sh
            scripts/install-agent.sh

  release:
    # 汇总产物 → 合并校验文件 → 写入 GitHub Release。
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Merge checksums
        # 把每个架构的 SHA256SUMS 合并为统一的 SHA256SUMS.txt,供安装脚本下载。
        run: |
          find release-assets -type f -name 'SHA256SUMS-*.txt' | sort | xargs cat > release-assets/SHA256SUMS.txt

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ env.RELEASE_TAG }}
        run: |
          if ! gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release create "$TAG_NAME" \
              --repo "$GH_REPO" \
              --title "XiMonitor $TAG_NAME" \
              --generate-notes
          fi

          gh release upload "$TAG_NAME" \
            --repo "$GH_REPO" \
            release-assets/release-x86_64-unknown-linux-musl/ximonitor-server-x86_64-unknown-linux-musl \
            release-assets/release-x86_64-unknown-linux-musl/ximonitor-agent-x86_64-unknown-linux-musl \
            release-assets/release-aarch64-unknown-linux-musl/ximonitor-server-aarch64-unknown-linux-musl \
            release-assets/release-aarch64-unknown-linux-musl/ximonitor-agent-aarch64-unknown-linux-musl \
            release-assets/release-scripts/install-server.sh \
            release-assets/release-scripts/install-agent.sh \
            release-assets/SHA256SUMS.txt \
            --clobber
